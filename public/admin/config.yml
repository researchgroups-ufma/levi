backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

locale: pt

collections:
  - name: "about"
    label: "Sobre o Grupo"
    files:
      - name: "about"
        label: "Apresentação Institucional"
        file: "content/about/index.md"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "string", required: false }
          - { label: "Missão", name: "mission", widget: "text" }
          - { label: "Histórico", name: "history", widget: "markdown" }
          - { label: "Imagem de destaque", name: "featured_image", widget: "image", required: false }

  - name: "research"
    label: "Linhas de Pesquisa"
    folder: "content/research"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nome", name: "title", widget: "string" }
      - { label: "Resumo curto", name: "summary", widget: "text" }
      - { label: "Descrição completa", name: "body", widget: "markdown" }
      - { label: "Imagem", name: "image", widget: "image", required: false }

- name: "members"
    label: "Membros"
    folder: "content/members"
    create: true
    slug: "{{slug}}"
    fields:
      # Nome completo do membro
      - { label: "Nome completo", name: "title", widget: "string" }
      
      # Função/nível — adicione ou remova opções conforme necessário
      - { label: "Função", name: "role", widget: "select", options: ["Coordenador", "Pesquisador Sênior", "Pós-Doutorando", "Doutorando", "Mestrando", "Iniciação Científica", "Egresso", "Colaborador Externo"] }
      
      # Afiliação institucional
      - { label: "Afiliação", name: "affiliation", widget: "string" }
      
      # Mini biografia — texto curto
      - { label: "Mini bio", name: "bio", widget: "text", required: false }
      
      # Foto do membro — enviada via upload
      - { label: "Foto", name: "photo", widget: "image", required: false }
      
      # Email institucional
      - { label: "E-mail", name: "email", widget: "string", required: false }
      
      # Links acadêmicos
      - { label: "Lattes", name: "lattes", widget: "string", required: false }
      - { label: "ORCID", name: "orcid", widget: "string", required: false }
      - { label: "Google Scholar", name: "scholar", widget: "string", required: false }
      - { label: "arXiv", name: "arxiv", widget: "string", required: false }
      
      # Linha de pesquisa — texto livre
      - { label: "Linha de pesquisa", name: "research_area", widget: "string", required: false }
      
      # Bolsa — ex: CAPES, CNPq, FAPEMA
      - { label: "Bolsa", name: "scholarship", widget: "string", required: false }
      
      # Ano de início no grupo
      - { label: "Ano de início", name: "year_start", widget: "string", required: false }
      
      # Apenas para egressos — ano de conclusão e instituição atual
      - { label: "Ano de conclusão (egressos)", name: "year_end", widget: "string", required: false }
      - { label: "Instituição atual (egressos)", name: "current_institution", widget: "string", required: false }

  - name: "publications"
    label: "Publicações"
    folder: "content/publications"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autores", name: "authors", widget: "string" }
      - { label: "Ano", name: "year", widget: "number" }
      - { label: "Periódico", name: "journal", widget: "string", required: false }
      - { label: "DOI", name: "doi", widget: "string", required: false }
      - { label: "arXiv", name: "arxiv", widget: "string", required: false }
      - { label: "Tipo", name: "type", widget: "select", options: ["Artigo", "Preprint", "Tese", "Dissertação", "Livro", "Capítulo"] }
      - { label: "Linha de pesquisa", name: "research_area", widget: "string", required: false }

  - name: "news"
    label: "Notícias"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Categoria", name: "category", widget: "select", options: ["Publicação", "Defesa", "Premiação", "Visita", "Mídia", "Outros"] }
      - { label: "Resumo", name: "excerpt", widget: "text" }
      - { label: "Conteúdo completo", name: "body", widget: "markdown" }
      - { label: "Imagem de capa", name: "cover_image", widget: "image", required: false }